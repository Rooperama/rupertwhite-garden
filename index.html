<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title></title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>

  <video id="bgvideo" autoplay muted playsinline>
    <source src="Singularity.mp4" type="video/mp4">
  </video>

<script>
  const video = document.getElementById('bgvideo');

  // Force play
  function playVideo() {
    video.play().catch(() => {
      const start = () => {
        video.play();
        document.removeEventListener('click', start);
        document.removeEventListener('touchstart', start);
      };
      document.addEventListener('click', start);
      document.addEventListener('touchstart', start);
    });
  }

  // Force looping
  video.addEventListener('ended', () => {
    video.currentTime = 0;
    video.play();
  });

  // Try to start the video
  if (video.readyState >= 2) {
    playVideo();
  } else {
    video.addEventListener('loadeddata', playVideo);
    video.addEventListener('canplay', playVideo);
  }
</script>

</body>
</html>

</body>
</html>
