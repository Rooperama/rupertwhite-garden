<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title></title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
  }

  /* Subtle dark vignette for depth and mood */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(
      circle at center,
      rgba(0,0,0,0) 30%,
      rgba(0,0,0,0.55) 80%
    );
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>

  <!-- Full screen looping video -->
  <video autoplay loop muted playsinline>
    <source src="Singularity.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Subtle vignette overlay for cinematic feel -->
  <div class="overlay"></div>

</body>
</html>
