<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title></title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #f4f1e9;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="garden"></canvas>

<script>
// Gentle Realistic Digital Garden - Calm & Meditative
const canvas = document.getElementById('garden');
const ctx = canvas.getContext('2d');

let width, height;
let plants = [];

function resize() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
}
window.addEventListener('resize', resize);
resize();

// Soft realistic colour palette
const colors = {
  stem: '#4a5c3f',
  leaf: '#5c7a52',
  leafLight: '#6e8f62',
  flower: ['#c9a8a0', '#b8a89a', '#d4c4b0', '#a8b8a0']
};

class Plant {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.height = 0;
    this.maxHeight = 80 + Math.random() * 120;
    this.growthSpeed = 0.3 + Math.random() * 0.4;
    this.sway = Math.random() * Math.PI * 2;
    this.swaySpeed = 0.015 + Math.random() * 0.01;
    this.leafCount = 3 + Math.floor(Math.random() * 3);
    this.flowerSize = 0;
    this.hasFlower = Math.random() > 0.4;
  }

  update() {
    if (this.height < this.maxHeight) {
      this.height += this.growthSpeed;
    } else if (this.hasFlower && this.flowerSize < 12) {
      this.flowerSize += 0.15;
    }
    this.sway += this.swaySpeed;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);

    // Stem
    ctx.strokeStyle = colors.stem;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    const swayAmount = Math.sin(this.sway) * 8;
    ctx.quadraticCurveTo(swayAmount * 0.3, -this.height * 0.5, swayAmount, -this.height);
    ctx.stroke();

    // Leaves
    ctx.fillStyle = colors.leaf;
    for (let i = 1; i <= this.leafCount; i++) {
      const leafY = -this.height * (i / (this.leafCount + 1));
      const leafSway = Math.sin(this.sway + i) * 4;

      ctx.save();
      ctx.translate(leafSway, leafY);

      // Left leaf
      ctx.beginPath();
      ctx.ellipse(-8, 0, 14, 6, -0.6, 0, Math.PI * 2);
      ctx.fill();

      // Right leaf
      ctx.fillStyle = colors.leafLight;
      ctx.beginPath();
      ctx.ellipse(8, 0, 14, 6, 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = colors.leaf;

      ctx.restore();
    }

    // Flower
    if (this.hasFlower && this.flowerSize > 2) {
      const flowerY = -this.height;
      const flowerSway = Math.sin(this.sway) * 3;

      ctx.save();
      ctx.translate(flowerSway, flowerY);

      ctx.fillStyle = colors.flower[Math.floor(Math.random() * colors.flower.length)];
      
      // Petals
      for (let p = 0; p < 5; p++) {
        ctx.save();
        ctx.rotate((p * Math.PI * 2) / 5);
        ctx.beginPath();
        ctx.ellipse(0, -this.flowerSize * 0.6, this.flowerSize * 0.5, this.flowerSize * 0.9, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // Centre
      ctx.fillStyle = '#d4b48c';
      ctx.beginPath();
      ctx.arc(0, 0, this.flowerSize * 0.35, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    ctx.restore();
  }
}

// Create initial gentle plants
function initGarden() {
  plants = [];
  const initialCount = Math.floor(width / 90);
  for (let i = 0; i < initialCount; i++) {
    const x = 60 + Math.random() * (width - 120);
    const y = height - 40;
    plants.push(new Plant(x, y));
  }
}

// Add new plant on click (subtle interaction)
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  plants.push(new Plant(x, y));
});

// Touch support for mobile
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  const y = e.touches[0].clientY - rect.top;
  plants.push(new Plant(x, y));
});

function animate() {
  ctx.clearRect(0, 0, width, height);

  // Soft ground
  ctx.fillStyle = '#e8e0d0';
  ctx.fillRect(0, height - 60, width, 60);

  // Update and draw plants
  for (let i = plants.length - 1; i >= 0; i--) {
    const plant = plants[i];
    plant.update();
    plant.draw();

    // Remove very old plants occasionally to keep it fresh
    if (plant.height > plant.maxHeight + 30 && Math.random() < 0.002) {
      plants.splice(i, 1);
    }
  }

  // Occasionally add a new plant naturally (passive growth)
  if (Math.random() < 0.008 && plants.length < 35) {
    const x = 40 + Math.random() * (width - 80);
    plants.push(new Plant(x, height - 40));
  }

  requestAnimationFrame(animate);
}

// Start everything
initGarden();
animate();

console.log('%c[Tiny Digital Garden] Calm meditative garden loaded.', 'color:#888');
</script>
</body>
</html>
